function shareOnWhatsApp() {
  const message = "https://generalhealthandwellness.com/category/questions-interactive-quiz-guide";
  const encodedMessage = encodeURIComponent(message);
  const whatsappUrl = "whatsapp://send?text=" + encodedMessage;
  window.open(whatsappUrl, '_blank');

let state = { idx: 0, answers: Array(QUESTIONS.length).fill(null) };
const total = QUESTIONS.length;

function renderQuestion() {
  const area = document.getElementById('q-area');
  const q = QUESTIONS[state.idx];
  document.getElementById('q-num').textContent = state.idx + 1;
  document.getElementById('q-total').textContent = total;
  const progress = Math.round((state.idx / total) * 100);
  document.getElementById('progress-bar').style.width = progress + '%';

  area.innerHTML = '';
  const qEl = document.createElement('div');
  qEl.innerHTML = `<div class="question">${state.idx + 1}. ${q.q}</div>`;
  const choices = document.createElement('div');
  choices.className = 'choices';

  q.c.forEach((choice, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.textContent = String.fromCharCode(65 + i) + '. ' + choice;
    if (state.answers[state.idx] === i) btn.classList.add('selected');

    btn.addEventListener('click', () => {
      state.answers[state.idx] = i;
      document.querySelectorAll('.choice').forEach(el => el.classList.remove('selected'));
      btn.classList.add('selected');
    });

    choices.appendChild(btn);
  });

  qEl.appendChild(choices);
  area.appendChild(qEl);
}

document.getElementById('nextBtn').addEventListener('click', () => {
  if (state.idx < total - 1) state.idx++;
  renderQuestion();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.idx > 0) state.idx--;
  renderQuestion();
});

document.getElementById('submitBtn').addEventListener('click', () => {
  const unanswered = state.answers.filter(a => a === null).length;
  if (unanswered > 0) {
    if (!confirm(`You have ${unanswered} unanswered questions. Submit anyway?`)) return;
  }
  gradeQuiz();
});

function gradeQuiz() {
  clearInterval(timerInterval); // stop timer

  let correct = 0;
  const review = [];

  for (let i = 0; i < total; i++) {
    const user = state.answers[i];
    const correctIdx = QUESTIONS[i].a;
    const ok = user === correctIdx;
    if (ok) correct++;
    review.push({ i, q: QUESTIONS[i].q, choices: QUESTIONS[i].c, user, correctIdx, ok });
  }

  showResult(correct, review);
}

function showResult(score, review) {
  document.getElementById('quiz-card').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'block';

  document.getElementById('score-title').textContent = `You scored ${score} out of ${total}`;
  const pct = Math.round((score / total) * 100);
  document.getElementById('score-summary').textContent = `Percentage: ${pct}%`;

  const list = document.getElementById('review-list');
  list.innerHTML = '';

  review.forEach(item => {
    const div = document.createElement('div');
    div.className = 'q-review';
    const head = document.createElement('div');
    head.style.fontWeight = '700';
    head.textContent = `${item.i + 1}. ${item.q}`;
    const userAns = document.createElement('div');
    const ua = item.user === null ? 'No answer' : String.fromCharCode(65 + item.user) + '. ' + item.choices[item.user];
    const ca = String.fromCharCode(65 + item.correctIdx) + '. ' + item.choices[item.correctIdx];
    userAns.innerHTML = `<div><strong>Your answer:</strong> ${ua}</div><div><strong>Correct:</strong> ${ca}</div>`;
    userAns.style.color = item.ok ? 'lightgreen' : '#fca5a5';
    div.appendChild(head);
    div.appendChild(userAns);
    list.appendChild(div);
  });
}

/* ---------------- TIMER ---------------- */
let totalSeconds = 30* 60; 
const countdownEl = document.getElementById('countdown-timer');
let timerInterval = null;
let warned = false;

//  Warning sound
function playWarningSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.5);
}

function startCountdown() {
  timerInterval = setInterval(() => {
    let mins = Math.floor(totalSeconds / 60);
    let secs = totalSeconds % 60;
    countdownEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    totalSeconds--;

    if (totalSeconds === 300 && !warned) { // 5 minutes left
      playWarningSound();
      alert("⚠️ 5 minutes remaining!");
      warned = true;
    }

    if (totalSeconds < 0) {
      clearInterval(timerInterval);
      gradeQuiz();
    }
  }, 1000);
}

/* ---------------- LIGHT MODE ---------------- */
const toggleBtn = document.createElement("button");
toggleBtn.textContent = "☀️";
toggleBtn.style.marginLeft = "10px";
document.querySelector("header").appendChild(toggleBtn);

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");
});

/* Reset */
document.getElementById('retryBtn')?.addEventListener('click', () => {
  state = { idx: 0, answers: Array(total).fill(null) };
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  totalSeconds = 45 * 60;
  warned = false;
  renderQuestion();
  startCountdown();
});

renderQuestion();
window.addEventListener('load', startCountdown);
</script>
