<body>
  <div class="wrap">
    <header>

                 <span class="span">Timer: <div class="timer" id="countdown-timer">25:00</div></span>

   <script>
       
       
       
       





const QUESTIONS = [

  {
  q: "Two point charges of +25 nC and -75 nC are separated by a distance of 3 cm in air. Calculate the magnitude of the electrostatic force between them. (Take k = 9.0 × 10^9 N m² C⁻².)",

  a: 0
},
{
  q: "Three point charges are located on the x-axis. A charge of +1 nC is at x = +2 cm, a charge of -3 nC is at x = +4 cm, and a charge of +5 nC is at the origin. Determine the magnitude of the force exerted on the charge at the origin by the +1 nC charge only. (Take k = 9.0 × 10^9 N m² C⁻².)",
  c: ["1.125 × 10⁻⁴ N", "8.4375 × 10⁻⁵ N", "2.25 × 10⁻⁴ N", "5.6 × 10⁻⁵ N"],
  a: 0
},
{
  q: "Three point charges are located on the x-axis. A charge of +1 nC is at x = +2 cm, a charge of -3 nC is at x = +4 cm, and a charge of +5 nC is at the origin. Calculate the magnitude of the force exerted on the charge at the origin by the -3 nC charge only. (Take k = 9.0 × 10^9 N m² C⁻².)",
  c: ["1.125 × 10⁻⁴ N", "8.4375 × 10⁻⁵ N", "6.75 × 10⁻⁵ N", "2.25 × 10⁻⁴ N"],
  a: 1
},
{
  q: "Calculate the electric field intensity at a point 2.0 m from a point charge of 4.0 nC in air. (Take k = 9.0 × 10^9 N m² C⁻².)",
  c: ["4.5 N/C", "9.0 N/C", "18.0 N/C", "2.25 N/C"],
  a: 1
},
{
  q: "An electron is released from rest in a uniform electric field of intensity 1.00 × 10^4 N/C. Determine its acceleration. (Take the electronic charge as 1.60 × 10⁻¹⁹ C and the electron mass as 9.11 × 10⁻³¹ kg.)",
  c: ["1.76 × 10^14 m/s²", "1.76 × 10^15 m/s²", "1.76 × 10^13 m/s²", "1.76 × 10^16 m/s²"],
  a: 1
},
{
  q: "An electron starts from rest and moves through a distance of 1.0 cm in a uniform electric field, acquiring an acceleration of 1.76 × 10^15 m/s². Calculate its final speed.",
  c: ["5.93 × 10^5 m/s", "5.93 × 10^6 m/s", "5.93 × 10^7 m/s", "5.93 × 10^4 m/s"],
  a: 1
},
{
  q: "An electron of mass 9.11 × 10⁻³¹ kg moves with a speed of 5.93 × 10^6 m/s. Calculate its kinetic energy.",
  c: ["1.6 × 10⁻¹⁷ J", "1.6 × 10⁻¹⁸ J", "1.6 × 10⁻¹⁶ J", "3.2 × 10⁻¹⁷ J"],
  a: 0
},
{
  q: "An electron accelerates uniformly from rest to a speed of 5.93 × 10^6 m/s with an acceleration of 1.76 × 10^15 m/s². Determine the time taken to attain this speed.",
  c: ["3.37 × 10⁻⁹ s", "3.37 × 10⁻⁸ s", "3.37 × 10⁻¹⁰ s", "3.37 × 10⁻⁷ s"],

},
{
  q: "Two parallel conducting plates are maintained at a potential difference of 40 V and separated by a distance of 10 mm. Calculate the electric field intensity between the plates.",
  c: ["400 N/C", "4000 N/C", "40 N/C", "40,000 N/C"],

},
{
  q: "Calculate the work done in moving a charge of +3.0 C through a potential difference of 40 V.",

{

  c: ["6000 J", "60,000 J", "600 J", "417 J"],

  q: "A 12.0 V car battery transfers 6.0 × 10⁴ C of charge. Determine the amount of energy supplied by the battery.",

{
  q: "A copper wire is 2.0 m long and has a radius of 1.0 mm. If the resistivity of copper is 1.7 × 10⁻⁸ Ωm, determine the resistance of the wire.",

function shareOnWhatsApp() {
  const message = "https://generalhealthandwellness.com/category/questions-interactive-quiz-guide";
  const encodedMessage = encodeURIComponent(message);
  const whatsappUrl = "whatsapp://send?text=" + encodedMessage;
  window.open(whatsappUrl, '_blank');
}

let state = { idx: 0, answers: Array(QUESTIONS.length).fill(null) };
const total = QUESTIONS.length;

function renderQuestion() {
  const area = document.getElementById('q-area');
  const q = QUESTIONS[state.idx];
  document.getElementById('q-num').textContent = state.idx + 1;
  document.getElementById('q-total').textContent = total;
  const progress = Math.round((state.idx / total) * 100);
  document.getElementById('progress-bar').style.width = progress + '%';

  area.innerHTML = '';
  const qEl = document.createElement('div');
  qEl.innerHTML = `<div class="question">${state.idx + 1}. ${q.q}</div>`;
  const choices = document.createElement('div');
  choices.className = 'choices';

  q.c.forEach((choice, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.textContent = String.fromCharCode(65 + i) + '. ' + choice;
    if (state.answers[state.idx] === i) btn.classList.add('selected');

    btn.addEventListener('click', () => {
      state.answers[state.idx] = i;
      document.querySelectorAll('.choice').forEach(el => el.classList.remove('selected'));
      btn.classList.add('selected');
    });

    choices.appendChild(btn);
  });

  qEl.appendChild(choices);
  area.appendChild(qEl);
}

document.getElementById('nextBtn').addEventListener('click', () => {
  if (state.idx < total - 1) state.idx++;
  renderQuestion();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.idx > 0) state.idx--;
  renderQuestion();
});

document.getElementById('submitBtn').addEventListener('click', () => {
  const unanswered = state.answers.filter(a => a === null).length;
  if (unanswered > 0) {
    if (!confirm(`You have ${unanswered} unanswered questions. Submit anyway?`)) return;
  }
  gradeQuiz();
});

function gradeQuiz() {
  clearInterval(timerInterval); // stop timer

  let correct = 0;
  const review = [];

  for (let i = 0; i < total; i++) {
    const user = state.answers[i];
    const correctIdx = QUESTIONS[i].a;
    const ok = user === correctIdx;
    if (ok) correct++;
    review.push({ i, q: QUESTIONS[i].q, choices: QUESTIONS[i].c, user, correctIdx, ok });
  }

  showResult(correct, review);
}

function showResult(score, review) {
  document.getElementById('quiz-card').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'block';

  document.getElementById('score-title').textContent = `You scored ${score} out of ${total}`;
  const pct = Math.round((score / total) * 100);
  document.getElementById('score-summary').textContent = `Percentage: ${pct}%`;

  const list = document.getElementById('review-list');
  list.innerHTML = '';

  review.forEach(item => {
    const div = document.createElement('div');
    div.className = 'q-review';
    const head = document.createElement('div');
    head.style.fontWeight = '700';
    head.textContent = `${item.i + 1}. ${item.q}`;
    const userAns = document.createElement('div');
    const ua = item.user === null ? 'No answer' : String.fromCharCode(65 + item.user) + '. ' + item.choices[item.user];
    const ca = String.fromCharCode(65 + item.correctIdx) + '. ' + item.choices[item.correctIdx];
    userAns.innerHTML = `<div><strong>Your answer:</strong> ${ua}</div><div><strong>Correct:</strong> ${ca}</div>`;
    userAns.style.color = item.ok ? 'lightgreen' : '#fca5a5';
    div.appendChild(head);
    div.appendChild(userAns);
    list.appendChild(div);
  });
}

/* ---------------- TIMER ---------------- */
let totalSeconds = 20* 60; 
const countdownEl = document.getElementById('countdown-timer');
let timerInterval = null;
let warned = false;

//  Warning sound
function playWarningSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.5);
}

function startCountdown() {
  timerInterval = setInterval(() => {
    let mins = Math.floor(totalSeconds / 60);
    let secs = totalSeconds % 60;
    countdownEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    totalSeconds--;

    if (totalSeconds === 300 && !warned) { // 5 minutes left
      playWarningSound();
      alert("⚠️ 5 minutes remaining!");
      warned = true;
    }

    if (totalSeconds < 0) {
      clearInterval(timerInterval);
      gradeQuiz();
    }
  }, 1000);
}

/* ---------------- LIGHT MODE ---------------- */
const toggleBtn = document.createElement("button");
toggleBtn.textContent = "☀️";
toggleBtn.style.marginLeft = "10px";
document.querySelector("header").appendChild(toggleBtn);

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");
});

/* Reset */
document.getElementById('retryBtn')?.addEventListener('click', () => {
  state = { idx: 0, answers: Array(total).fill(null) };
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  totalSeconds = 45 * 60;
  warned = false;
  renderQuestion();
  startCountdown();
});

renderQuestion();
window.addEventListener('load', startCountdown);
</script>
